version: 0.2
phases:
  install:
    commands:
      - echo "Installing Terraform ${TF_VERSION} on Ubuntu..."
      - apt-get update && apt-get install -y unzip curl
      - curl -s -qL -o terraform.zip https://releases.hashicorp.com/terraform/${TF_VERSION}/terraform_${TF_VERSION}_linux_amd64.zip
      - unzip -o terraform.zip
      - mv terraform /usr/local/bin/
      - terraform --version
  pre_build:
    commands:
      - echo "Fetching secrets from Secrets Manager..."
      - SECRET_JSON=$(aws secretsmanager get-secret-value --secret-id ${AWS_SECRET_NAME} --query SecretString --output text | jq . >  terraform.tfvars.json || { echo "Failed to fetch secret"; exit 1; })
      - terraform init -input=false -backend-config="bucket=${PROJECT_NAME}-infra-terraform-state"
  build:
    commands:
      - echo "Running Terraform Plan..."
      - terraform plan -out=tfplan -input=false -var-file=terraform.tfvars.json
  post_build:
    commands:
      - rm -f terraform.tfvars.json
artifacts:
  files:
    - tfplan
    - modules/lambda/rds_scheduler/rds_scheduler.zip
    - .terraform.lock.hcl
